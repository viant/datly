init:
  parentPath: $parent.path
  created: $FormatTime('nowInUTC', 'yyyy-MM-ddT00:00:00Z')
  expect: $LoadData('${parentPath}/expect.json')

pipeline:
  printHello:
    action: print
    message: hello action 1

  test:
    action: http/runner:send
    requests:
      - Method: GET
        URL: http://127.0.0.1:8080/v1/api/shape/dev/vendors-env?vendorIDs=1,2
        Expect:
          Code: 200
          JSONBody: $expect

  info:
    action: print
    message: $AsJSON($test)
