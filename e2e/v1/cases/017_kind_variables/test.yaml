init:
  parentPath: $parent.path
  expect: $LoadJSON('${parentPath}/expect.json')

pipeline:
  test:
    description: constant variables are substituted into SQL expressions before execution
    action: http/runner:send
    requests:
      - Method: GET
        URL: http://127.0.0.1:8080/v1/api/shape/dev/ws/vars/
        Expect:
          Code: 200
          JSONBody: $expect
