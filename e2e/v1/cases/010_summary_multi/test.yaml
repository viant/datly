init:
  parentPath: $parent.path
  expect: $LoadJSON('${parentPath}/expect.json')
pipeline:
  test:
    description: multiple summary views can be joined off the same root projection
    action: http/runner:send
    requests:
      - Method: GET
        URL: http://127.0.0.1:8080/v1/api/shape/dev/meta/vendors-format
        Expect:
          Code: 200
          JSONBody: $expect
