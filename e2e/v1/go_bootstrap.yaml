init:
  wildcardConfig: ${v1Path}/autogen/Datly/config_go_all.json
  singleConfig: ${v1Path}/autogen/Datly/config_go_vendor_list.json
  routerAppDir: ${v1Path}/routerapp
  routerPkgDir: ${v1Path}/routerpkg
  routerImports: ${routerAppDir}/imports_gen.go
  goBootstrapPort: 8081
  wildcardExpect: $LoadData('${v1Path}/cases/001_relation_one_to_many/expect.json')
  adminExpect: $LoadData('${v1Path}/cases/019_component_dependency/expect_admin.json')

pipeline:
  prepare:
    action: exec:run
    target: $target
    checkError: true
    commands:
      - cd ${appPath}
      - mkdir -p ${routerAppDir}
      - mkdir -p ${v1Path}/autogen/Datly
      - printf "package main\n\nimport (\n" > ${routerImports}
      - |
        find ${v1Path}/shape ${routerPkgDir} -type f -name '*.go' ! -name '*_test.go' -print \
          | xargs -n1 dirname \
          | sort -u \
          | sed "s#^${appPath}/#github.com/viant/datly/#" \
          | sed 's#^#\t_ "#; s#$#"#' >> ${routerImports}
      - printf ")\n" >> ${routerImports}
      - |
        cat > ${wildcardConfig} <<'EOF'
        {
          "APIKeys": [
            {
              "Header": "App-Secret-Id",
              "URI": "/v1/api/shape/dev/secured",
              "Value": "changeme"
            }
          ],
          "APIPrefix": "/v1/api/shape",
          "GoBootstrap": {
            "Packages": [
              "github.com/viant/datly/e2e/v1/shape/dev/...",
              "github.com/viant/datly/e2e/v1/routerpkg/..."
            ]
          },
          "DependencyURL": "${v1Path}/autogen/Datly/dependencies",
          "Endpoint": {
            "Port": ${goBootstrapPort}
          },
          "JWTValidator": {
            "RSA": [
              {
                "Key": "blowfish://default",
                "URL": "file://localhost${appPath}/e2e/local/jwt/public.enc"
              }
            ]
          },
          "JwtSigner": {
            "RSA": {
              "URL": "file://localhost${appPath}/e2e/local/jwt/public.enc",
              "Key": "blowfish://default"
            }
          },
          "Meta": {
            "CacheURI": "/v1/api/cache/warmup",
            "ConfigURI": "/v1/api/meta/config",
            "MetricURI": "/v1/api/meta/metric",
            "OpenApiURI": "/v1/api/meta/openapi",
            "StateURI": "/v1/api/meta/state",
            "StatusURI": "/v1/api/status",
            "StructURI": "/v1/api/meta/struct",
            "ViewURI": "/v1/api/meta/view"
          },
          "SyncFrequencyMs": 2000
        }
        EOF
      - |
        cat > ${singleConfig} <<'EOF'
        {
          "APIKeys": [
            {
              "Header": "App-Secret-Id",
              "URI": "/v1/api/shape/dev/secured",
              "Value": "changeme"
            }
          ],
          "APIPrefix": "/v1/api/shape",
          "GoBootstrap": {
            "Packages": [
              "github.com/viant/datly/e2e/v1/shape/dev/vendorsvc/list"
            ]
          },
          "DependencyURL": "${v1Path}/autogen/Datly/dependencies",
          "Endpoint": {
            "Port": ${goBootstrapPort}
          },
          "JWTValidator": {
            "RSA": [
              {
                "Key": "blowfish://default",
                "URL": "file://localhost${appPath}/e2e/local/jwt/public.enc"
              }
            ]
          },
          "JwtSigner": {
            "RSA": {
              "URL": "file://localhost${appPath}/e2e/local/jwt/public.enc",
              "Key": "blowfish://default"
            }
          },
          "Meta": {
            "CacheURI": "/v1/api/cache/warmup",
            "ConfigURI": "/v1/api/meta/config",
            "MetricURI": "/v1/api/meta/metric",
            "OpenApiURI": "/v1/api/meta/openapi",
            "StateURI": "/v1/api/meta/state",
            "StatusURI": "/v1/api/status",
            "StructURI": "/v1/api/meta/struct",
            "ViewURI": "/v1/api/meta/view"
          },
          "SyncFrequencyMs": 2000
        }
        EOF

  build:
    action: exec:run
    target: $target
    checkError: true
    commands:
      - cd ${appPath}
      - export GO111MODULE=on
      - export GOFLAGS=-mod=mod
      - go build -ldflags "-X main.BuildTimeInS=`date +%s`" -o /tmp/datly_go_router ./e2e/v1/routerapp

  wildcardApp:
    stop:
      action: process:stop
      target: $target
      input: datly_go_router

    start:
      action: process:start
      sleepTimeMs: 6000
      target: $target
      directory: /tmp/
      checkError: true
      immuneToHangups: true
      env:
        TEST: 1
      command: ulimit -Sn 10000 && ./datly_go_router -c=${wildcardConfig} > /tmp/datly_v1_go_all.out 2>&1

  wildcardJWT:
    action: secret:signJWT
    privateKey:
      URL: ${appPath}/e2e/cloud/jwt/private.enc
      Key: blowfish://default
    claims:
      userID: 2
      firstName: Developer
      email: dev@viantint.com

  wildcardTest:
    action: http/runner:send
    requests:
      - Method: GET
        description: wildcard GoBootstrap loads vendor list route from generated router packages
        URL: http://127.0.0.1:${goBootstrapPort}/v1/api/shape/dev/vendors/
        Expect:
          Code: 200
          JSONBody: $wildcardExpect
      - Method: GET
        description: wildcard GoBootstrap loads cross-package component dependency route
        URL: http://127.0.0.1:${goBootstrapPort}/v1/api/shape/dev/vendors/component-acl?name=2
        Header:
          Authorization: Bearer ${wildcardJWT.TokenString}
        Expect:
          Code: 200
          JSONBody: $adminExpect
      - Method: GET
        description: wildcard GoBootstrap loads linked handler route from linked Go package
        URL: http://127.0.0.1:${goBootstrapPort}/v1/api/shape/dev/linked/auth?echo=hello
        Header:
          Authorization: Bearer ${wildcardJWT.TokenString}
        Expect:
          Code: 200
          JSONBody:
            status: ok
            data:
              userID: 2
              firstName: Developer
              echo: hello

  singleApp:
    stop:
      action: process:stop
      target: $target
      input: datly_go_router

    start:
      action: process:start
      sleepTimeMs: 6000
      target: $target
      directory: /tmp/
      checkError: true
      immuneToHangups: true
      env:
        TEST: 1
      command: ulimit -Sn 10000 && ./datly_go_router -c=${singleConfig} > /tmp/datly_v1_go_one.out 2>&1

  singleTest:
    action: http/runner:send
    requests:
      - Method: GET
        description: single-package GoBootstrap loads only the requested vendor/list package
        URL: http://127.0.0.1:${goBootstrapPort}/v1/api/shape/dev/vendors/
        Expect:
          Code: 200
          JSONBody: $wildcardExpect
      - Method: GET
        description: single-package GoBootstrap does not load unrelated user ACL route
        URL: http://127.0.0.1:${goBootstrapPort}/v1/api/shape/dev/auth/user-acl
        Expect:
          Code: 404

  cleanup:
    action: process:stop
    target: $target
    input: datly_go_router
