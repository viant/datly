init:
  wildcardConfig: ${v1Path}/autogen/Datly/config_go_all.json
  singleConfig: ${v1Path}/autogen/Datly/config_go_vendor_list.json
  routerAppDir: ${v1Path}/routerapp
  routerPkgDir: ${v1Path}/routerpkg
  routerImports: ${routerAppDir}/imports_gen.go
  goBootstrapPort: 18081
  wildcardExpect: $LoadData('${v1Path}/cases/001_relation_one_to_many/expect.json')
  adminExpect: $LoadData('${v1Path}/cases/019_component_dependency/expect_admin.json')
  wildcardExpectFile: ${v1Path}/cases/001_relation_one_to_many/expect.json
  adminExpectFile: ${v1Path}/cases/019_component_dependency/expect_admin.json

pipeline:
  prepare:
    action: exec:run
    target: $target
    checkError: true
    commands:
      - cd ${appPath}
      - mkdir -p ${routerAppDir}
      - mkdir -p ${v1Path}/autogen/Datly
      - printf "package main\n\nimport (\n" > ${routerImports}
      - |
        find ${v1Path}/shape ${routerPkgDir} -type f -name '*.go' ! -name '*_test.go' -print \
          | xargs -n1 dirname \
          | sort -u \
          | sed "s#^${appPath}/#github.com/viant/datly/#" \
          | sed 's#^#\t_ "#; s#$#"#' >> ${routerImports}
      - printf ")\n" >> ${routerImports}
      - |
        cat > ${wildcardConfig} <<'EOF'
        {
          "APIKeys": [
            {
              "Header": "App-Secret-Id",
              "URI": "/v1/api/shape/dev/secured",
              "Value": "changeme"
            }
          ],
          "APIPrefix": "/v1/api/shape",
          "GoBootstrap": {
            "Packages": [
              "github.com/viant/datly/e2e/v1/shape/dev/...",
              "github.com/viant/datly/e2e/v1/routerpkg/..."
            ]
          },
          "DependencyURL": "${v1Path}/autogen/Datly/dependencies",
          "Endpoint": {
            "Port": ${goBootstrapPort}
          },
          "JWTValidator": {
            "RSA": [
              {
                "Key": "blowfish://default",
                "URL": "file://localhost${appPath}/e2e/local/jwt/public.enc"
              }
            ]
          },
          "JwtSigner": {
            "RSA": {
              "URL": "file://localhost${appPath}/e2e/local/jwt/public.enc",
              "Key": "blowfish://default"
            }
          },
          "Meta": {
            "CacheURI": "/v1/api/cache/warmup",
            "ConfigURI": "/v1/api/meta/config",
            "MetricURI": "/v1/api/meta/metric",
            "OpenApiURI": "/v1/api/meta/openapi",
            "StateURI": "/v1/api/meta/state",
            "StatusURI": "/v1/api/status",
            "StructURI": "/v1/api/meta/struct",
            "ViewURI": "/v1/api/meta/view"
          },
          "SyncFrequencyMs": 2000
        }
        EOF
      - |
        cat > ${singleConfig} <<'EOF'
        {
          "APIKeys": [
            {
              "Header": "App-Secret-Id",
              "URI": "/v1/api/shape/dev/secured",
              "Value": "changeme"
            }
          ],
          "APIPrefix": "/v1/api/shape",
          "GoBootstrap": {
            "Packages": [
              "github.com/viant/datly/e2e/v1/shape/dev/vendorsvc/list"
            ]
          },
          "DependencyURL": "${v1Path}/autogen/Datly/dependencies",
          "Endpoint": {
            "Port": ${goBootstrapPort}
          },
          "JWTValidator": {
            "RSA": [
              {
                "Key": "blowfish://default",
                "URL": "file://localhost${appPath}/e2e/local/jwt/public.enc"
              }
            ]
          },
          "JwtSigner": {
            "RSA": {
              "URL": "file://localhost${appPath}/e2e/local/jwt/public.enc",
              "Key": "blowfish://default"
            }
          },
          "Meta": {
            "CacheURI": "/v1/api/cache/warmup",
            "ConfigURI": "/v1/api/meta/config",
            "MetricURI": "/v1/api/meta/metric",
            "OpenApiURI": "/v1/api/meta/openapi",
            "StateURI": "/v1/api/meta/state",
            "StatusURI": "/v1/api/status",
            "StructURI": "/v1/api/meta/struct",
            "ViewURI": "/v1/api/meta/view"
          },
          "SyncFrequencyMs": 2000
        }
        EOF

  build:
    action: exec:run
    target: $target
    checkError: true
    commands:
      - cd ${appPath}
      - export GO111MODULE=on
      - export GOFLAGS=-mod=mod
      - go build -ldflags "-X main.BuildTimeInS=`date +%s`" -o /tmp/datly_go_router ./e2e/v1/routerapp

  wildcardApp:
    stop:
      action: exec:run
      target: $target
      checkError: true
      commands:
        - pkill -f '/tmp/datly_go_router -c=/Users/awitas/go/src/github.com/viant/datly/e2e/v1/autogen/Datly/config_go_all.json' >/dev/null 2>&1 || true
        - pkill -f '/tmp/datly_go_router -c=/Users/awitas/go/src/github.com/viant/datly/e2e/v1/autogen/Datly/config_go_vendor_list.json' >/dev/null 2>&1 || true
        - pkill -f 'datly_go_router' >/dev/null 2>&1 || true

  wildcardJWT:
    action: secret:signJWT
    privateKey:
      URL: ${appPath}/e2e/cloud/jwt/private.enc
      Key: blowfish://default
    claims:
      userID: 2
      firstName: Developer
      email: dev@viantint.com

  wildcardTest:
    action: exec:run
    target: $target
    checkError: true
    commands:
      - |
        set -e
        cd /tmp
        rm -f /tmp/datly_v1_go_all.out /tmp/datly_v1_go_all.pid /tmp/datly_v1_go_all_actual.json /tmp/datly_v1_go_admin_actual.json /tmp/datly_v1_go_linked_actual.json
        export TEST=1
        setsid ./datly_go_router -c=${wildcardConfig} >/tmp/datly_v1_go_all.out 2>&1 < /dev/null &
        echo $! >/tmp/datly_v1_go_all.pid
        cleanup() {
          if [ -f /tmp/datly_v1_go_all.pid ]; then
            kill "$(cat /tmp/datly_v1_go_all.pid)" >/dev/null 2>&1 || true
          fi
        }
        trap cleanup EXIT
        for i in $(seq 1 30); do
          if curl -sf http://127.0.0.1:${goBootstrapPort}/v1/api/status >/dev/null; then
            break
          fi
          sleep 1
        done
        curl -sf http://127.0.0.1:${goBootstrapPort}/v1/api/shape/dev/vendors/ >/tmp/datly_v1_go_all_actual.json
        jq -S . /tmp/datly_v1_go_all_actual.json >/tmp/datly_v1_go_all_actual.norm
        jq -S . ${wildcardExpectFile} >/tmp/datly_v1_go_all_expect.norm
        diff -u /tmp/datly_v1_go_all_expect.norm /tmp/datly_v1_go_all_actual.norm
        curl -sf -H 'Authorization: Bearer ${wildcardJWT.TokenString}' 'http://127.0.0.1:${goBootstrapPort}/v1/api/shape/dev/vendors/component-acl?name=2' >/tmp/datly_v1_go_admin_actual.json
        jq -S . /tmp/datly_v1_go_admin_actual.json >/tmp/datly_v1_go_admin_actual.norm
        jq -S . ${adminExpectFile} >/tmp/datly_v1_go_admin_expect.norm
        diff -u /tmp/datly_v1_go_admin_expect.norm /tmp/datly_v1_go_admin_actual.norm
        curl -sf -H 'Authorization: Bearer ${wildcardJWT.TokenString}' 'http://127.0.0.1:${goBootstrapPort}/v1/api/shape/dev/linked/auth?echo=hello' >/tmp/datly_v1_go_linked_actual.json
        jq -e '.status == "ok" and .data.userID == 2 and .data.firstName == "Developer" and .data.echo == "hello"' /tmp/datly_v1_go_linked_actual.json >/dev/null

  singleApp:
    stop:
      action: exec:run
      target: $target
      checkError: true
      commands:
        - pkill -f '/tmp/datly_go_router -c=/Users/awitas/go/src/github.com/viant/datly/e2e/v1/autogen/Datly/config_go_all.json' >/dev/null 2>&1 || true
        - pkill -f '/tmp/datly_go_router -c=/Users/awitas/go/src/github.com/viant/datly/e2e/v1/autogen/Datly/config_go_vendor_list.json' >/dev/null 2>&1 || true
        - pkill -f 'datly_go_router' >/dev/null 2>&1 || true

  singleTest:
    action: exec:run
    target: $target
    checkError: true
    commands:
      - |
        set -e
        cd /tmp
        rm -f /tmp/datly_v1_go_one.out /tmp/datly_v1_go_one.pid /tmp/datly_v1_go_one_actual.json
        export TEST=1
        setsid ./datly_go_router -c=${singleConfig} >/tmp/datly_v1_go_one.out 2>&1 < /dev/null &
        echo $! >/tmp/datly_v1_go_one.pid
        cleanup() {
          if [ -f /tmp/datly_v1_go_one.pid ]; then
            kill "$(cat /tmp/datly_v1_go_one.pid)" >/dev/null 2>&1 || true
          fi
        }
        trap cleanup EXIT
        for i in $(seq 1 30); do
          if curl -sf http://127.0.0.1:${goBootstrapPort}/v1/api/status >/dev/null; then
            break
          fi
          sleep 1
        done
        curl -sf http://127.0.0.1:${goBootstrapPort}/v1/api/shape/dev/vendors/ >/tmp/datly_v1_go_one_actual.json
        jq -S . /tmp/datly_v1_go_one_actual.json >/tmp/datly_v1_go_one_actual.norm
        jq -S . ${wildcardExpectFile} >/tmp/datly_v1_go_one_expect.norm
        diff -u /tmp/datly_v1_go_one_expect.norm /tmp/datly_v1_go_one_actual.norm
        code=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:${goBootstrapPort}/v1/api/shape/dev/auth/user-acl)
        test "$code" = "404"

  cleanup:
    action: exec:run
    target: $target
    checkError: true
    commands:
      - pkill -f '/tmp/datly_go_router -c=/Users/awitas/go/src/github.com/viant/datly/e2e/v1/autogen/Datly/config_go_all.json' >/dev/null 2>&1 || true
      - pkill -f '/tmp/datly_go_router -c=/Users/awitas/go/src/github.com/viant/datly/e2e/v1/autogen/Datly/config_go_vendor_list.json' >/dev/null 2>&1 || true
      - pkill -f 'datly_go_router' >/dev/null 2>&1 || true
